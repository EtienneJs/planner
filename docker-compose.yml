services:
  db:
    image: postgres:16-alpine
    container_name: planner-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: planner
    ports:
      - "5432:5432"
    volumes:
      - planner_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Opcional: descomenta para ejecutar la app en Docker
  # app:
  #   build: .
  #   container_name: planner-app
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     DATABASE_URL: postgresql://postgres:postgres@db:5432/planner
  #   depends_on:
  #     db:
  #       condition: service_healthy

volumes:
  planner_postgres_data:
